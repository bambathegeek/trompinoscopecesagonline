<style>
  :root {

    --cesag-green-dk:#004D2C;
    --cesag-green-lt:#E8F5EE;
    --cesag-orange:  #E87722;
    --gray-50:  #F8FAFB;
    --gray-100: #F0F3F6;
    --gray-150: #E8ECF0;
    --gray-200: #DFE4E9;
    --gray-300: #C5CDD5;
    --gray-400: #9AA5B1;
    --gray-500: #6B7885;
    --gray-600: #4A5568;
    --gray-700: #2D3748;
    --gray-800: #1A202C;
    --white:    #FFFFFF;
    --card-w:   300px;
    --card-h:   400px;
    --avatar-sz:84px;
    --radius:   16px;
    --radius-sm: 10px;
    --shadow:   0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
    --shadow-hover: 0 8px 30px rgba(0,107,63,.14), 0 2px 8px rgba(0,0,0,.08);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #F0F4F1 0%, #E8EDEA 100%);
    color: var(--gray-800);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .site-header {
    background: linear-gradient(135deg, var(--cesag-green-dk) 0%, var(--cesag-green) 50%, #0A7A4A 100%);
    padding: 32px 40px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,.2);
  }
  .header-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .logo-block { display: flex; align-items: center; gap: 18px; }
  .logo-emblem {
    width: 56px; height: 56px;
    background: var(--white);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    overflow: hidden;
    padding: 8px;
  }
  .logo-emblem img { width: 100%; height: 100%; object-fit: contain; }
  .header-titles h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.8vw, 28px);
    color: var(--white);
    letter-spacing: -0.3px;
    line-height: 1.2;
    font-weight: 600;
  }
  .header-titles p {
    font-size: 12px;
    color: rgba(255,255,255,.65);
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .header-controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; transition: var(--transition); }
  .search-wrap:focus-within { transform: scale(1.02); }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.5); pointer-events: none;
    transition: var(--transition-fast);
  }
  .search-wrap:focus-within svg { color: rgba(255,255,255,.9); }
  #searchInput {
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.22);
    color: var(--white);
    border-radius: 28px;
    padding: 11px 18px 11px 42px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 260px;
    outline: none;
    transition: var(--transition-fast);
    backdrop-filter: blur(10px);
  }
  #searchInput::placeholder { color: rgba(255,255,255,.45); font-weight: 300; }
  #searchInput:focus {
    background: rgba(255,255,255,.2);
    border-color: rgba(255,255,255,.5);
    box-shadow: 0 0 0 4px rgba(255,255,255,.1);
  }
  .badge-total {
    background: rgba(255,255,255,.12);
    color: var(--white);
    border-radius: 24px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid rgba(255,255,255,.2);
    white-space: nowrap;
    backdrop-filter: blur(10px);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
  }
  #visibleCount { color: #FFD700; font-weight: 700; font-size: 15px; }

  .tabs-bar {
    background: rgba(255,255,255,.92);
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 116px;
    z-index: 90;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    backdrop-filter: blur(16px);
  }
  .tabs-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    overflow-x: auto;
    gap: 4px;
    padding: 4px 24px;
    scrollbar-width: none;
  }
  .tabs-inner::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 14px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-500);
    border-radius: var(--radius-sm);
    margin: 4px 0;
    transition: var(--transition-fast);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  .tab-btn:hover { color: var(--cesag-green); background: var(--cesag-green-lt); }
  .tab-btn.active {
    color: var(--cesag-green);
    background: var(--cesag-green-lt);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,107,63,.12);
  }
  .tab-badge {
    background: var(--gray-150);
    color: var(--gray-500);
    border-radius: 12px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 600;
    transition: var(--transition-fast);
  }
  .tab-btn.active .tab-badge { background: var(--cesag-green); color: var(--white); }

  .main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 40px 28px 80px;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding: 0 4px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--cesag-green);
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .section-sep {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--cesag-green-lt), transparent);
    border-radius: 2px;
  }
  .section-count {
    font-size: 13px;
    color: var(--gray-500);
    font-weight: 500;
    background: var(--gray-100);
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
    gap: 24px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    height: var(--card-h);
    overflow: hidden;
    transition: var(--transition);
    position: relative;
    cursor: default;
    border: 1px solid var(--gray-100);
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-hover);
    border-color: transparent;
  }
  .card:hover .card-accent { opacity: 1; height: 4px; }
  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--prog-color, var(--cesag-green));
    opacity: .6;
    transition: var(--transition-fast);
    z-index: 2;
  }

  .card-top {
    padding: 22px 20px 16px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-shrink: 0;
  }
  .avatar {
    width: var(--avatar-sz);
    height: var(--avatar-sz);
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--prog-color, var(--cesag-green));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--white);
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    overflow: hidden;
    position: relative;
    border: 3px solid var(--white);
    outline: 2px solid var(--prog-bg, var(--cesag-green-lt));
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; border-radius: 50%; }

  .card-identity { flex: 1; min-width: 0; padding-top: 4px; }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-800);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.2px;
  }
  .card-prog-chip {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    background: var(--prog-bg, var(--cesag-green-lt));
    color: var(--prog-color, var(--cesag-green));
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Inter', sans-serif;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gray-150), transparent);
    margin: 0 20px;
    flex-shrink: 0;
  }

  .card-body {
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    flex: 1;
    overflow: hidden;
  }
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    color: var(--gray-700);
    line-height: 1.45;
  }
  .info-row .icon {
    width: 16px; height: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--prog-color, var(--cesag-green));
    opacity: 0.8;
  }
  .info-row .val {
    flex: 1;
    min-width: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    font-weight: 500;
  }
  .info-row .val.single { -webkit-line-clamp: 1; }
  .info-row .label {
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--gray-400);
    white-space: nowrap;
    margin-bottom: 1px;
  }
  .profil-row .val {
    font-size: 11.5px;
    color: var(--gray-500);
    font-style: italic;
    line-height: 1.5;
  }

  .card-footer {
    padding: 12px 20px 16px;
    background: linear-gradient(180deg, var(--gray-50), var(--white));
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .contact-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--gray-600);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 22px;
    padding: 6px 12px;
    min-width: 0;
    flex: 1;
    overflow: hidden;
    transition: var(--transition-fast);
    cursor: pointer;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .contact-pill:hover {
    border-color: var(--prog-color, var(--cesag-green));
    background: var(--prog-bg, var(--cesag-green-lt));
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .contact-pill svg { flex-shrink: 0; color: var(--prog-color, var(--cesag-green)); opacity: 0.7; }
  .contact-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .contact-pill.whatsapp {
    flex: 0 0 auto;
    min-width: 100px;
    background: linear-gradient(135deg, #25D36608, #25D36615);
    border-color: #25D36630;
  }
  .contact-pill.whatsapp:hover {
    border-color: #25D366;
    background: linear-gradient(135deg, #25D36615, #25D36625);
    box-shadow: 0 2px 12px rgba(37,211,102,.15);
  }
  .contact-pill.whatsapp svg { color: #25D366; }

  .contact-pill.email {
    position: relative;
    cursor: copy;
  }
  .contact-pill.email::after {
    content: 'Copié !';
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--gray-800);
    color: white;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    transition: var(--transition-fast);
    pointer-events: none;
  }
  .contact-pill.email.copied::after {
    transform: translateX(-50%) scale(1);
    opacity: 1;
  }
  .contact-pill.email:hover {
    border-color: #4A90D9;
    background: linear-gradient(135deg, #4A90D908, #4A90D915);
  }
  .contact-pill.email svg { color: #4A90D9; }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 100px 20px;
    color: var(--gray-400);
  }
  .empty-state svg { opacity: .25; margin-bottom: 20px; }
  .empty-state p { font-size: 16px; font-weight: 400; }

  .prog-section { display: none; }
  .prog-section.visible { display: block; }
  .prog-section + .prog-section.visible { margin-top: 56px; }

  #noResult {
    display: none;
    text-align: center;
    padding: 100px 20px;
    color: var(--gray-400);
    font-size: 16px;
  }
  #noResult svg { opacity: .2; margin-bottom: 20px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

  @media (max-width: 768px) {
    :root { --card-w: 260px; --card-h: 380px; --avatar-sz: 72px; }
    .site-header { padding: 20px 16px 16px; top: 0; position: relative; }
    .tabs-bar { top: 0; }
    .main { padding: 24px 14px 50px; }
    #searchInput { width: 180px; }
    .section-title { font-size: 20px; }
    .card-name { font-size: 14px; }
  }
  @media (max-width: 480px) {
    :root { --card-w: 100%; }
    .cards-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
    .card-footer { flex-direction: column; gap: 6px; }
    .contact-pill { width: 100%; }
    .contact-pill.whatsapp { min-width: unset; }
    .avatar { width: 64px; height: 64px; font-size: 20px; }
    .card-top { padding: 16px 14px 12px; }
    .card-body { padding: 10px 14px; }
    .card-footer { padding: 10px 14px 14px; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeInUp 0.5s ease-out forwards; }
  .prog-section.visible .card:nth-child(1) { animation-delay: 0.02s; }
  .prog-section.visible .card:nth-child(2) { animation-delay: 0.04s; }
  .prog-section.visible .card:nth-child(3) { animation-delay: 0.06s; }
  .prog-section.visible .card:nth-child(4) { animation-delay: 0.08s; }
  .prog-section.visible .card:nth-child(5) { animation-delay: 0.10s; }
  .prog-section.visible .card:nth-child(6) { animation-delay: 0.12s; }
  .prog-section.visible .card:nth-child(7) { animation-delay: 0.14s; }
  .prog-section.visible .card:nth-child(8) { animation-delay: 0.16s; }
  .prog-section.visible .card:nth-child(9) { animation-delay: 0.18s; }
  .prog-section.visible .card:nth-child(10) { animation-delay: 0.20s; }
  .prog-section.visible .card:nth-child(n+11) { animation-delay: 0.22s; }
</style>

function formatWhatsApp(num) {
  if (!num || num === '—') return null;
  let clean = num.replace(/[\s\(\)\-]/g, '').replace(/^\+/, '');
  if (clean.length < 8) return null;
  return clean;
}

const progOrder = Object.keys(
  DATA.reduce((acc, r) => { acc[r.programme] = (acc[r.programme]||0)+1; return acc; }, {})
).sort((a,b) => {
  const ca = DATA.filter(r=>r.programme===a).length;
  const cb = DATA.filter(r=>r.programme===b).length;
  return cb - ca;
});

const grouped = {};
progOrder.forEach(p => { grouped[p] = DATA.filter(r => r.programme === p); });

function cardHTML(p, pc) {
  const poste  = p.poste  && p.poste  !== 'Non renseigné' ? p.poste  : '—';
  const pays   = p.pays   && p.pays   !== 'Non renseigné' ? p.pays   : '—';
  const profil = p.profil || '—';
  const email  = p.email  || '—';
  const wa     = p.whatsapp || '—';
  const waClean = formatWhatsApp(wa);
  const photoPath = `photos/${p.id}.jpg`;

  const emailPill = email !== '—' 
    ? `<div class="contact-pill email" onclick="copyEmail(this, '${email.replace(/'/g, "\'")}')" title="Cliquer pour copier">${ICONS.mail}<span>${email}</span></div>`
    : `<div class="contact-pill email">${ICONS.mail}<span>—</span></div>`;

  const waPill = waClean 
    ? `<a href="https://wa.me/${waClean}" target="_blank" rel="noopener" class="contact-pill whatsapp" title="Ouvrir WhatsApp">${ICONS.phone}<span>${wa}</span></a>`
    : `<div class="contact-pill whatsapp">${ICONS.phone}<span>${wa}</span></div>`;

  return `<div class="card" data-id="${p.id}" data-name="${p.nomComplet.toLowerCase()}" data-prog="${p.programme}"
         style="--prog-color:${pc.color}; --prog-bg:${pc.bg}">
    <div class="card-accent"></div>
    <div class="card-top">
      <div class="avatar" style="background:${pc.color}">
        <img src="${photoPath}" alt="" onerror="this.style.display='none'">
        ${p.initiales}
      </div>
      <div class="card-identity">
        <div class="card-name">${p.nomComplet}</div>
        <span class="card-prog-chip">${p.programme}</span>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-body">
      <div class="info-row">
        ${ICONS.briefcase}
        <div>
          <div class="label">Poste</div>
          <div class="val">${poste}</div>
        </div>
      </div>
      <div class="info-row">
        ${ICONS.globe}
        <div>
          <div class="label">Pays</div>
          <div class="val single">${pays}</div>
        </div>
      </div>
      <div class="info-row profil-row">
        ${ICONS.user}
        <div>
          <div class="label">Profil</div>
          <div class="val">${profil}</div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      ${emailPill}
      ${waPill}
    </div>
  </div>`;
}

function copyEmail(el, email) {
  navigator.clipboard.writeText(email).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = email;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1800);
  });
}

const tabsInner = document.getElementById('tabsInner');
const allBtn = document.createElement('button');
allBtn.className = 'tab-btn active';
allBtn.dataset.prog = 'all';
allBtn.innerHTML = `Tous <span class="tab-badge">${DATA.length}</span>`;
tabsInner.appendChild(allBtn);

progOrder.forEach(prog => {
  const cnt = grouped[prog].length;
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.dataset.prog = prog;
  btn.innerHTML = `${prog} <span class="tab-badge">${cnt}</span>`;
  tabsInner.appendChild(btn);
});

const main = document.getElementById('main');
progOrder.forEach(prog => {
  const pc = getPC(prog);
  const auds = grouped[prog];
  const sec = document.createElement('div');
  sec.className = 'prog-section visible';
  sec.dataset.prog = prog;
  sec.innerHTML = `
    <div class="section-head">
      <h2 class="section-title" style="color:${pc.color}">${prog}</h2>
      <div class="section-sep" style="background:linear-gradient(90deg,${pc.bg},transparent)"></div>
      <span class="section-count">${auds.length} auditeur${auds.length>1?'s':''}</span>
    </div>
    <div class="cards-grid">${auds.map(p=>cardHTML(p,pc)).join('')}</div>`;
  main.appendChild(sec);
});

let currentProg = 'all';
function switchTab(prog) {
  currentProg = prog;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.prog === prog));
  document.querySelectorAll('.prog-section').forEach(s => {
    if (prog === 'all') s.classList.add('visible');
    else s.classList.toggle('visible', s.dataset.prog === prog);
  });
  applySearch();
}
tabsInner.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.prog);
});

const searchInput = document.getElementById('searchInput');
const visibleCount = document.getElementById('visibleCount');
const noResult = document.getElementById('noResult');

function applySearch() {
  const q = searchInput.value.trim().toLowerCase();
  let total = 0;
  document.querySelectorAll('.card').forEach(card => {
    const inTab = currentProg === 'all' || card.dataset.prog === currentProg;
    const match = !q || card.dataset.name.includes(q)
      || card.dataset.prog.toLowerCase().includes(q)
      || card.textContent.toLowerCase().includes(q);
    const show = inTab && match;
    card.style.display = show ? '' : 'none';
    if (show) total++;
  });
  visibleCount.textContent = total;
  noResult.style.display = total === 0 ? 'block' : 'none';
}
searchInput.addEventListener('input', applySearch);
</script>
